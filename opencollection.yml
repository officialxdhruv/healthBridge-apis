opencollection: 1.0.0

info:
  name: healthBridge-apis
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: url
      value: http://localhost:3000
    - name: admin
      value: "{{url}}/api/v1/admin"
    - name: user
      value: "{{url}}/api/v1/user"
    - name: doctor
      value: "{{url}}/api/v1/doctor"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
